<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="auth-page">
    <section class="auth-card">
        <div>
            <p class="eyebrow">Espace membre</p>
            <h1>Connexion</h1>
            <p class="hero-copy">Accede a ton espace pour conserver tes films favoris et ta liste a voir.</p>
        </div>

        <p class="error-banner" th:if="${error}" th:text="${error}">Erreur</p>

        <form th:action="@{/login}" method="post" class="auth-form">
            <label for="username">Nom d'utilisateur</label>
            <input id="username" name="username" type="text" required>

            <label for="password">Mot de passe</label>
            <input id="password" name="password" type="password" required>

            <button type="submit" class="button-primary auth-submit">Se connecter</button>
        </form>

        <p class="auth-switch">Pas encore de compte ? <a th:href="@{/register}">Creer un compte</a></p>
        <a th:href="@{/films}" class="back-link">Retour au catalogue</a>
    </section>
</div>
</body>
</html>
