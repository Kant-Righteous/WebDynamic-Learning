<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Result</title>
</head>
<body>
    <h2>Result</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Number</th>
                <th>X^2</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="n : ${numberList}">
                <td th:text="${n}"></td>
                <td th:text="${n*n}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
